<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG Grid Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3f0; --surface: #fff; --border: #e0ddd8;
    --text: #1a1a1a; --muted: #999; --accent: #4a7c59; --danger: #c0392b; --radius: 12px;
  }
  body {
    background: var(--bg); font-family: 'DM Sans', sans-serif;
    color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px; gap: 16px;
  }
  h1 { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 440px; }
  .card-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .upload-btn { display: block; width: 100%; padding: 28px 16px; border: 1.5px dashed var(--border); border-radius: 8px; background: none; cursor: pointer; text-align: center; transition: all 0.2s; }
  .upload-btn:hover { border-color: var(--accent); background: #f0f5f2; }
  .upload-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .upload-text strong { color: var(--accent); }
  #canvasWrap { display: none; margin-top: 14px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); user-select: none; -webkit-user-select: none; }
  #cropCanvas { display: block; width: 100%; cursor: crosshair; touch-action: none; }
  .hint { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.7; }
  .hint span { color: var(--accent); font-weight: 500; }
  .status { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 8px; min-height: 16px; }
  .status.ok { color: var(--accent); }
  .btn { margin-top: 12px; background: var(--accent); color: white; border: none; border-radius: 7px; padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #previewCard { display: none; }
  .grid-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .profile-dot { width: 30px; height: 30px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .profile-name { font-size: 13px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .grid-cell { aspect-ratio: 4/5; overflow: hidden; position: relative; background: #e8e4df; }
  .grid-cell img.cell-img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* green border: only when .show-border */
  .grid-cell.is-new.show-border::after { content: ''; position: absolute; inset: 0; border: 2.5px solid var(--accent); pointer-events: none; z-index: 1; }

  /* new badge */
  .new-badge { position: absolute; top: 5px; left: 5px; background: var(--accent); color: white; font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; z-index: 4; text-transform: uppercase; pointer-events: none; }

  /* empty slot */
  .cell-empty { width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 4px; }
  .cell-empty .plus { font-size: 26px; line-height: 1; color: var(--accent); font-weight: 300; }
  .cell-empty .plus-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  /* overlay */
  .cell-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.52); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; z-index: 3; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .grid-cell.show-overlay .cell-overlay { opacity: 1; pointer-events: all; }
  .ov-btn { background: rgba(255,255,255,0.95); border: none; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; padding: 6px 12px; width: 80%; text-align: center; transition: background 0.15s; }
  .ov-btn:hover { background: #fff; }
  .ov-btn.danger { color: var(--danger); }
  .ov-btn.safe { color: var(--accent); }
  .cell-ph { width: 100%; height: 100%; background: linear-gradient(135deg, #ede9e4, #e0ddd8); }

  /* Close icon on new cells */
  .cell-close {
    position: absolute; top: 5px; right: 5px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    background: none;
    color: #fff; font-size: 13px; line-height: 1;
    cursor: pointer; z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    transition: text-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .cell-close::before { content: ''; position: absolute; inset: -8px; }
  .cell-close:hover { text-shadow: 0 1px 5px rgba(0,0,0,0.45); }
  .grid-cell.is-new.draggable { cursor: grab; }
  .grid-cell.is-new.dragging { opacity: 0.4; cursor: grabbing; }
  .grid-cell.is-new.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
</style>
</head>
<body>

<h1>IG Grid Preview</h1>

<!-- Step 1 -->
<div class="card">
  <div class="card-label">Upload &amp; Crop</div>
  <div class="hint" style="margin-bottom:12px">
    <span>1.</span> 上傳你的 IG 個人檔案截圖（必須包含 9 張圖）
  </div>
  <button class="upload-btn" onclick="document.getElementById('gridInput').click()">
    <div class="upload-text">點擊上傳<br><strong>IG 個人檔案截圖</strong></div>
  </button>
  <input type="file" accept="image/*" id="gridInput" style="display:none">
  <div class="hint" id="cropHint" style="display:none;margin-top:12px;margin-bottom:8px">
    <span>2.</span> 拖拉框選出 grid 前 9 張圖片，從第一張圖左上角 → 拖到最後一張完整圖右下角
  </div>
  <div id="canvasWrap"><canvas id="cropCanvas"></canvas></div>
  <div class="status" id="step1Status"></div>
  <button class="btn" id="confirmBtn" style="display:none" onclick="confirmCrop()">確認裁切</button>
  <button class="btn btn-ghost" id="retryBtn" style="display:none" onclick="resetCanvas()">重新框選</button>
</div>

<!-- Preview -->
<div class="card" id="previewCard">
  <div class="card-label">Preview</div>
  <div class="grid-header">
    <div class="profile-dot"></div>
    <span class="profile-name">@username</span>
  </div>
  <div class="grid" id="theGrid"></div>
  <input type="file" accept="image/*" id="newImgInput" style="display:none">
  <div id="dragHint" style="display:none;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:14px">長按可移動新貼文順序</div>
  <button class="btn btn-ghost" id="addBtn" style="margin-top:14px" onclick="addNewSlot()">＋ 再新增一格</button>
  <button class="btn btn-ghost" style="margin-top:8px" onclick="resetPreview()">重置 Preview</button>
</div>

<!-- Full reset -->
<button class="btn btn-danger" id="fullResetBtn" style="max-width:440px;width:100%;display:none" onclick="location.reload()">全部重置</button>

<script>
  const MAX_NEW = 7;
  let storedSlices = [];
  let newSlots = [];
  let activeUploadIdx = null;
  let origImg = null, displayScale = 1, snapshot = null;
  let isDragging = false, dragStart = null, dragRect = null;

  const canvas = document.getElementById('cropCanvas');
  const ctx = canvas.getContext('2d');

  // ── Load screenshot ──────────────────────────────────────────────────────────
  document.getElementById('gridInput').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        origImg = img; dragStart = null; dragRect = null; isDragging = false;
        displayScale = Math.min(400 / img.width, 1);
        canvas.width  = Math.round(img.width  * displayScale);
        canvas.height = Math.round(img.height * displayScale);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        document.getElementById('canvasWrap').style.display = 'block';
        document.getElementById('cropHint').style.display = 'block';
        document.getElementById('step1Status').textContent = '';
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('retryBtn').style.display = 'none';
        setTimeout(() => scrollToElement(document.getElementById('canvasWrap')), 150);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // ── Canvas helpers ───────────────────────────────────────────────────────────
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
    const src = (e.touches&&e.touches.length>0)?e.touches[0]:(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
    return { x:Math.max(0,Math.min(canvas.width,(src.clientX-rect.left)*sx)), y:Math.max(0,Math.min(canvas.height,(src.clientY-rect.top)*sy)) };
  }
  function drawSelection() {
    ctx.putImageData(snapshot,0,0);
    if (!dragRect) return;
    const {x1,y1,x2,y2}=dragRect, w=x2-x1, h=y2-y1;
    if (w<2||h<2) return;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(0,0,canvas.width,y1); ctx.fillRect(0,y2,canvas.width,canvas.height-y2);
    ctx.fillRect(0,y1,x1,h); ctx.fillRect(x2,y1,canvas.width-x2,h);
    ctx.strokeStyle='#4a7c59'; ctx.lineWidth=2; ctx.setLineDash([]); ctx.strokeRect(x1,y1,w,h);
    ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
    for(let c=1;c<3;c++){const lx=x1+w*c/3;ctx.beginPath();ctx.moveTo(lx,y1);ctx.lineTo(lx,y2);ctx.stroke();}
    for(let r=1;r<3;r++){const ly=y1+h*r/3;ctx.beginPath();ctx.moveTo(x1,ly);ctx.lineTo(x2,ly);ctx.stroke();}
    ctx.setLineDash([]);
  }

  canvas.addEventListener('mousedown',e=>{if(!origImg)return;e.preventDefault();isDragging=true;dragStart=getPos(e);dragRect=null;document.getElementById('confirmBtn').style.display='none';document.getElementById('retryBtn').style.display='none';document.getElementById('step1Status').textContent='拖拉中…';});
  window.addEventListener('mousemove',e=>{if(!isDragging||!dragStart)return;const cur=getPos(e);dragRect={x1:Math.min(dragStart.x,cur.x),y1:Math.min(dragStart.y,cur.y),x2:Math.max(dragStart.x,cur.x),y2:Math.max(dragStart.y,cur.y)};drawSelection();});
  window.addEventListener('mouseup',e=>{if(!isDragging)return;isDragging=false;if(!dragRect)return;const w=dragRect.x2-dragRect.x1,h=dragRect.y2-dragRect.y1;if(w<20||h<20){document.getElementById('step1Status').textContent='範圍太小，請重新拖拉';dragRect=null;ctx.putImageData(snapshot,0,0);return;}drawSelection();document.getElementById('step1Status').textContent='格線對齊了嗎？';document.getElementById('confirmBtn').style.display='block';document.getElementById('retryBtn').style.display='block';setTimeout(()=>scrollToElement(document.getElementById('confirmBtn')),50);});
  canvas.addEventListener('touchstart',e=>{if(!origImg)return;e.preventDefault();isDragging=true;dragStart=getPos(e);dragRect=null;document.getElementById('confirmBtn').style.display='none';document.getElementById('retryBtn').style.display='none';},{passive:false});
  window.addEventListener('touchmove',e=>{if(!isDragging||!dragStart)return;e.preventDefault();const cur=getPos(e);dragRect={x1:Math.min(dragStart.x,cur.x),y1:Math.min(dragStart.y,cur.y),x2:Math.max(dragStart.x,cur.x),y2:Math.max(dragStart.y,cur.y)};drawSelection();},{passive:false});
  window.addEventListener('touchend',e=>{if(!isDragging)return;isDragging=false;if(!dragRect)return;const w=dragRect.x2-dragRect.x1,h=dragRect.y2-dragRect.y1;if(w<20||h<20){document.getElementById('step1Status').textContent='範圍太小，請重新拖拉';dragRect=null;ctx.putImageData(snapshot,0,0);return;}drawSelection();document.getElementById('step1Status').textContent='格線對齊了嗎？';document.getElementById('confirmBtn').style.display='block';document.getElementById('retryBtn').style.display='block';setTimeout(()=>scrollToElement(document.getElementById('confirmBtn')),50);},{passive:false});

  function resetCanvas() {
    dragRect=null;dragStart=null;isDragging=false;
    ctx.putImageData(snapshot,0,0);
    document.getElementById('step1Status').textContent='';
    document.getElementById('confirmBtn').style.display='none';
    document.getElementById('retryBtn').style.display='none';
  }

  // ── Confirm crop ─────────────────────────────────────────────────────────────
  function confirmCrop() {
    if (!dragRect||!origImg) return;
    const s=1/displayScale;
    const ox1=dragRect.x1*s, oy1=dragRect.y1*s;
    const ow=(dragRect.x2-dragRect.x1)*s, oh=(dragRect.y2-dragRect.y1)*s;
    const cw=ow/3, ch=oh/3;
    storedSlices=[];
    for(let r=0;r<3;r++) for(let c=0;c<3;c++){
      const tile=document.createElement('canvas');
      tile.width=Math.round(cw); tile.height=Math.round(ch);
      tile.getContext('2d').drawImage(origImg,ox1+c*cw,oy1+r*ch,cw,ch,0,0,tile.width,tile.height);
      storedSlices.push(tile.toDataURL('image/jpeg',0.92));
    }
    newSlots = [{ src: null }];
    renderGrid();
    document.getElementById('step1Status').className='status ok';
    document.getElementById('step1Status').textContent='✓ 完成';
    document.getElementById('confirmBtn').style.display='none';
    document.getElementById('retryBtn').style.display='none';
    document.getElementById('previewCard').style.display='block';
    document.getElementById('fullResetBtn').style.display='block';
    setTimeout(() => scrollToElement(document.getElementById('previewCard')), 50);
  }

  // ── Reset preview only ───────────────────────────────────────────────────────
  function resetPreview() {
    newSlots = [{ src: null }];
    renderGrid();
  }

  // ── Render grid ──────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('theGrid');
    grid.innerHTML = '';
    const n = newSlots.length;

    newSlots.forEach((slot, idx) => {
      const cell = document.createElement('div');
      // green border: only on empty slots (awaiting upload)
      cell.className = 'grid-cell is-new' + (slot.src ? '' : ' show-border');
      cell.dataset.idx = idx;

      if (!slot.src) {
        // Empty — no badge, green border, + icon
        cell.innerHTML = `
          ${n > 1 ? `<span class="cell-close" onclick="removeSlot(${idx});event.stopPropagation()">✕</span>` : ''}
          <div class="cell-empty" onclick="triggerUpload(${idx})">
            <span class="plus">+</span>
            <span class="plus-label">新貼文</span>
          </div>`;
      } else {
        // Filled — badge, no border by default, overlay on click
        cell.innerHTML = `
          <span class="new-badge">new</span>
          ${n > 1 ? `<span class="cell-close" onclick="removeSlot(${idx});event.stopPropagation()">✕</span>` : ''}
          <img class="cell-img" src="${slot.src}" alt="">
          <div class="cell-overlay">
            <button class="ov-btn safe" onclick="triggerUpload(${idx});event.stopPropagation()">重新上傳</button>
          </div>`;
        cell.addEventListener('click', () => toggleOverlay(cell));
        // drag only when 2+ filled slots
        if (newSlots.filter(s => s.src).length >= 2) {
          cell.classList.add('draggable');
          cell.setAttribute('draggable', 'true');
          cell.addEventListener('dragstart', onDragStart);
          cell.addEventListener('dragend', onDragEnd);
          cell.addEventListener('dragover', onDragOver);
          cell.addEventListener('dragleave', onDragLeave);
          cell.addEventListener('drop', onDrop);
        }
      }
      grid.appendChild(cell);
    });

    // Existing slices
    const remaining = 9 - n;
    for (let i = 0; i < remaining; i++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.innerHTML = storedSlices[i]
        ? `<img class="cell-img" src="${storedSlices[i]}" alt="">`
        : '<div class="cell-ph"></div>';
      grid.appendChild(cell);
    }

    // Add button label with countdown
    const remaining_slots = MAX_NEW - n;
    const addBtn = document.getElementById('addBtn');
    if (n >= MAX_NEW) {
      addBtn.disabled = true;
      addBtn.textContent = '已達上限 7 張';
    } else {
      addBtn.disabled = false;
      addBtn.textContent = `＋ 再新增一格 (${remaining_slots})`;
    }
    document.getElementById('dragHint').style.display = n >= 2 ? 'block' : 'none';
  }

  // ── Overlay toggle ───────────────────────────────────────────────────────────
  function toggleOverlay(cell) {
    const isShowing = cell.classList.contains('show-overlay');
    document.querySelectorAll('.grid-cell.show-overlay').forEach(c => {
      c.classList.remove('show-overlay');
      c.classList.remove('show-border'); // hide border when overlay closes
    });
    if (!isShowing) {
      cell.classList.add('show-overlay');
      cell.classList.add('show-border'); // show border when overlay is open
    }
  }

  // Click outside: close overlay, hide borders on filled slots
  document.addEventListener('click', e => {
    if (!e.target.closest('.grid-cell.is-new')) {
      document.querySelectorAll('.grid-cell.show-overlay').forEach(c => c.classList.remove('show-overlay'));
      // hide border only on filled slots (empty slots always keep border)
      document.querySelectorAll('.grid-cell.is-new').forEach(c => {
        const idx = parseInt(c.dataset.idx);
        if (!isNaN(idx) && newSlots[idx] && newSlots[idx].src) {
          c.classList.remove('show-border');
        }
      });
    }
  });

  // ── Upload ───────────────────────────────────────────────────────────────────
  function triggerUpload(idx) {
    activeUploadIdx = idx;
    const inp = document.getElementById('newImgInput');
    inp.value = '';
    inp.click();
  }

  document.getElementById('newImgInput').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      newSlots[activeUploadIdx].src = ev.target.result;
      renderGrid();
    };
    reader.readAsDataURL(file);
  });

  // ── Add / remove ─────────────────────────────────────────────────────────────
  function addNewSlot() {
    if (newSlots.length >= MAX_NEW) return;
    newSlots.unshift({ src: null });
    renderGrid();
  }

  function clearSlot(idx) {
    newSlots[idx].src = null;
    renderGrid();
  }


  // ── Scroll helper ────────────────────────────────────────────────────────────
  function scrollToElement(el) {
    const top = el.getBoundingClientRect().top + window.scrollY - window.innerHeight / 6;
    window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
  }
  // ── Drag to reorder ─────────────────────────────────────────────────────────
  let dragSrcIdx = null;

  function onDragStart(e) {
    dragSrcIdx = parseInt(e.currentTarget.dataset.idx);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }
  function onDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }
  function onDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const targetIdx = parseInt(e.currentTarget.dataset.idx);
    if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
    // swap
    const tmp = newSlots[dragSrcIdx];
    newSlots[dragSrcIdx] = newSlots[targetIdx];
    newSlots[targetIdx] = tmp;
    dragSrcIdx = null;
    renderGrid();
  }

  function removeSlot(idx) {
    newSlots.splice(idx, 1);
    if (newSlots.length === 0) newSlots = [{ src: null }];
    renderGrid();
  }
</script>
</body>
</html>
